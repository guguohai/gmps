    <script>
        // Toggle menu collapse/expand
        function toggleMenu(btn) {
            const content = btn.nextElementSibling;
            const allMenus = document.querySelectorAll('.menu-content');

            // Close all other menus
            allMenus.forEach(menu => {
                if (menu !== content) {
                    menu.classList.add('hidden');
                    // Reset arrow rotation
                    const closeBtn = menu.previousElementSibling;
                    const arrow = closeBtn.querySelector('.fi-rr-angle-small-down');
                    if (arrow) {
                        arrow.style.transform = 'rotate(0deg)';
                    }
                }
            });

            // Toggle current menu
            content.classList.toggle('hidden');

            // Rotate arrow
            const arrow = btn.querySelector('.fi-rr-angle-small-down');
            if (arrow) {
                if (content.classList.contains('hidden')) {
                    arrow.style.transform = 'rotate(0deg)';
                } else {
                    arrow.style.transform = 'rotate(180deg)';
                }
            }
        }

        // Searchable Processor Dropdown Functions
        function toggleProcessorDropdown() {
            const dropdown = document.getElementById('processor-dropdown');
            const isHidden = dropdown.classList.contains('hidden');

            // Close other dropdowns if any (optional)

            if (isHidden) {
                dropdown.classList.remove('hidden');
                document.getElementById('processor-search-input').focus();
            } else {
                dropdown.classList.add('hidden');
            }
        }

        function filterProcessors() {
            const input = document.getElementById('processor-search-input');
            const filter = input.value.toLowerCase();
            const options = document.getElementById('processor-options').querySelectorAll('div:not(#no-processor-results)');
            let hasResults = false;

            options.forEach(option => {
                const text = option.textContent.toLowerCase();
                if (text.includes(filter)) {
                    option.classList.remove('hidden');
                    hasResults = true;
                } else {
                    option.classList.add('hidden');
                }
            });

            const noResults = document.getElementById('no-processor-results');
            if (hasResults) {
                noResults.classList.add('hidden');
            } else {
                noResults.classList.remove('hidden');
            }
        }

        function selectProcessor(name) {
            const displayText = document.getElementById('selected-processor-text');
            displayText.textContent = name;
            displayText.classList.remove('text-slate-400');
            displayText.classList.add('text-slate-900');

            // Close dropdown
            document.getElementById('processor-dropdown').classList.add('hidden');

            // Log for verification
            console.log('Selected processor:', name);
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function (event) {
            const container = document.getElementById('processor-search-container');
            const dropdown = document.getElementById('processor-dropdown');

            if (container && !container.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        });

        // Toggle sidebar collapse/expand
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('w-64');
            sidebar.classList.toggle('w-20');
        }
    </script>

    <script>
        function toggleMenu(btn) {
            const content = btn.nextElementSibling;
            const allMenus = document.querySelectorAll(".menu-content");
            allMenus.forEach((menu) => {
                if (menu !== content) {
                    menu.classList.add("hidden");
                    const closeBtn = menu.previousElementSibling;
                    const arrow = closeBtn.querySelector('.fi-rr-angle-small-down');
                    if (arrow) arrow.style.transform = 'rotate(0deg)';
                }
            });
            content.classList.toggle("hidden");
            const arrow = btn.querySelector('.fi-rr-angle-small-down');
            if (arrow) {
                arrow.style.transform = content.classList.contains("hidden") ? 'rotate(0deg)' : 'rotate(180deg)';
            }
        }

        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            const allDropdowns = document.querySelectorAll('[id$="-dropdown"]');
            allDropdowns.forEach(d => {
                if (d.id !== id) d.classList.add('hidden');
            });
            dropdown.classList.toggle('hidden');
        }

        // Close dropdowns when clicking outside
        window.onclick = function (event) {
            if (!event.target.closest('.relative')) {
                const dropdowns = document.querySelectorAll('[id$="-dropdown"]');
                dropdowns.forEach(d => d.classList.add('hidden'));
            }
        }
    </script>

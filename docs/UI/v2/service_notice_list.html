<!doctype html>

          </button>
          <div class="menu-content hidden py-1">

          </div>
        </div>
        <!-- 产品管理 -->
        <div class="menu-group">
          <button class="menu-toggle w-full flex items-center justify-between px-6 py-3 text-slate-600 hover:bg-slate-50 hover:text-primary transition-all group" onclick="toggleMenu(this)">

            <div class="flex items-center">
              <i class="fi-rr-boxes w-[16px] h-[16px] mr-3 flex items-center justify-center"></i>
              <span class="text-[13px]">库存管理</span>
            </div>
            <i class="fi fi-rr-angle-small-down w-[12px] h-[12px] text-slate-500 transition-transform duration-200 flex items-center justify-center"></i>
          </button>
          <div class="menu-content hidden py-1">
            <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors" href="./inventory_request_list.html">申请单</a>

        </div>
        <!-- 小零件管理 -->
        <div class="menu-group">
          <button class="menu-toggle w-full flex items-center justify-between px-6 py-3 text-slate-600 hover:bg-slate-50 hover:text-primary transition-all group" onclick="toggleMenu(this)">

          </button>
          <div class="menu-content hidden py-1">
            <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors" href="./parts_list.html">小零件列表</a>

        <!-- 系统配置 -->

            <div class="flex items-center">

          </button>
          <div class="menu-content hidden py-1">
            <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors" href="./config_dict_list.html">数据字典</a>

    <main class="ml-64 flex-1 min-w-0 min-h-[calc(100vh-64px)] bg-[#F5F7FA]">

        <div class="bg-white p-12 rounded-xl border border-slate-100 shadow-sm flex flex-col items-center justify-center min-h-[400px]">
          <i class="fi fi-rr-layers text-slate-200 text-6xl mb-4"></i>
          <h2 class="text-xl font-bold text-slate-400">正在开发中</h2>
          <p class="text-slate-400 mt-2">此页面正在构建，请稍后再试。</p>
        </div>
      </div>
    </main>
  </div>
  <script>
    function toggleMenu(btn) {
      const content = btn.nextElementSibling;
      const allMenus = document.querySelectorAll(".menu-content");
      allMenus.forEach((menu) => {
        if (menu !== content) {
          menu.classList.add("hidden");
          const closeBtn = menu.previousElementSibling;
          const arrow = closeBtn.querySelector('.fi-rr-angle-small-down');
          if (arrow) arrow.style.transform = 'rotate(0deg)';
        }
      });
      content.classList.toggle("hidden");
      const arrow = btn.querySelector('.fi-rr-angle-small-down');
      if (arrow) {
        arrow.style.transform = content.classList.contains("hidden") ? 'rotate(0deg)' : 'rotate(180deg)';
      }
    }
  </script>

</html>

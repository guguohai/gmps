<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PRODUCT SERVICE</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />

    <!-- Uicons Icons -->
    <link href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css" rel="stylesheet">



    <!-- Tailwind Config -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error-container": "#fe8983",
                        "on-secondary-fixed": "#2a4159",
                        "on-primary-fixed-variant": "#0058ba",
                        "inverse-on-surface": "#999da1",
                        "on-surface": "#26343d",
                        "on-primary-fixed": "#003d85",
                        "secondary-fixed-dim": "#bfd7f4",
                        "primary-container": "#d8e2ff",
                        "secondary-dim": "#3e556e",
                        "on-tertiary": "#f9f9f9",
                        "on-background": "#26343d",
                        "surface-container-high": "#e2e8f0",
                        "on-error": "#fff7f6",
                        "inverse-surface": "#0a0f12",
                        "on-secondary-container": "#3d546c",
                        "on-tertiary-container": "#5a5c5c",
                        "tertiary-fixed": "#f4f3f3",
                        "secondary-fixed": "#cfe4ff",
                        "on-error-container": "#752121",
                        "tertiary-dim": "#525354",
                        "surface-bright": "#ffffff",
                        "on-tertiary-fixed-variant": "#656666",
                        "background": "#F5F7FA",
                        "outline-variant": "#a4b4be",
                        "surface-container": "#f1f5f9",
                        "inverse-primary": "#4a8eff",
                        "secondary-container": "#cfe4ff",
                        "on-surface-variant": "#52616a",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#004fa8",
                        "on-secondary": "#f7f9ff",
                        "secondary": "#4a617a",
                        "primary-fixed-dim": "#c2d4ff",
                        "on-primary": "#f7f7ff",
                        "outline": "#cbd0dd",
                        "surface-container-low": "#f8fafc",
                        "tertiary": "#5e5f5f",
                        "error": "#9f403d",
                        "tertiary-container": "#f4f3f3",
                        "surface": "#F5F7FA",
                        "error-dim": "#4e0309",
                        "surface-variant": "#d5e5ef",
                        "surface-container-highest": "#cbd5e1",
                        "tertiary-fixed-dim": "#e5e5e5",
                        "on-tertiary-fixed": "#484a4a",
                        "primary-dim": "#004fa9",
                        "surface-dim": "#cadde9",
                        "primary": "#177ee5",
                        "primary-fixed": "#d8e2ff",
                        "surface-tint": "#177ee5",
                        "on-secondary-fixed-variant": "#465d76"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        .kpi-font {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>

<body class="bg-[#F5F7FA] text-on-surface min-h-screen flex flex-col relative overflow-hidden">
    <!-- Background Pattern -->
    <div class="absolute inset-0 opacity-[0.03] pointer-events-none overflow-hidden">
        <svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern height="40" id="grid" patternUnits="userSpaceOnUse" width="40">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="1"></path>
                </pattern>
            </defs>
            <rect fill="url(#grid)" height="100%" width="100%"></rect>
        </svg>
    </div>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center relative z-10 px-4 py-16">
        <!-- Login Card -->
        <div class="w-full bg-white rounded-xl shadow-lg overflow-hidden flex flex-col border border-outline/30"
            style="max-width: 500px;">
            <!-- Header -->
            <div class="pb-8 px-8 md:px-12 flex flex-col items-center text-center pt-10">
                <img alt="Product Service Logo" class="h-12 w-12 object-contain" src="logo.png" />
                <h1 class="font-extrabold pt-2 tracking-tighter uppercase text-[#6e7891] text-2xl md:text-3xl leading-none">
                    PRODUCT SERVICE
                </h1>
                <p class="text-on-surface-variant font-semibold text-2xl mt-1 uppercase tracking-wider">LOGIN</p>
            </div>

            <!-- Login Form -->
            <form class="px-8 md:px-12 pb-12 space-y-6"
                onsubmit="window.location.href='./dashboard.html'; return false;">
                <!-- Username -->
                <div class="space-y-2">
                    <label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant px-1"
                        for="username">
                        ID
                    </label>
                    <div class="relative">
                        <i
                            class="fi fi-rr-user absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[20px] leading-none"></i>
                        <input
                            class="w-full bg-surface-container border border-outline rounded-xl py-3.5 pl-11 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400"
                            id="username" type="text" placeholder="Enter your ID" />
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <div class="flex justify-between items-end px-1">
                        <label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant"
                            for="password">
                            Password
                        </label>
                        <a class="text-[11px] font-semibold text-primary hover:underline transition-all" href="#">
                            Forgot password?
                        </a>
                    </div>
                    <div class="relative">
                        <i
                            class="fi fi-rr-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[20px] leading-none"></i>
                        <input
                            class="w-full bg-surface-container border border-outline rounded-xl py-3.5 pl-11 pr-11 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400"
                            id="password" type="password" placeholder="••••••••" />
                        <button
                            class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-on-surface transition-colors"
                            type="button">
                            <i class="fi fi-rr-eye text-[20px] leading-none"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Submit -->
                <button
                    class="w-full bg-primary text-on-primary font-bold py-4 px-4 rounded-xl shadow-md hover:shadow-lg hover:bg-primary-dim transition-all duration-200 transform active:scale-[0.98] mt-4 flex items-center justify-center space-x-2"
                    type="submit">
                    <span class="text-sm">Sign In</span>
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer
        class="flex flex-col md:flex-row justify-center items-center space-y-4 md:space-y-0 md:space-x-8 w-full py-8 font-['Inter'] text-[10px] md:text-xs text-slate-500 bg-transparent relative z-10 px-6 text-center">
        <span>© 2024 Arctic Precision After-Sales. All rights reserved.</span>
        <div class="flex space-x-4">
            <a class="hover:text-slate-700 transition-colors" href="#">Terms of Service</a>
            <a class="hover:text-slate-700 transition-colors" href="#">Privacy Policy</a>
            <a class="hover:text-slate-700 transition-colors" href="#">System Status</a>
        </div>
    </footer>

    <script>
        // Toggle password visibility
        document.querySelector('button[type="button"]').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('.fi');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fi-rr-eye');
                icon.classList.add('fi-rr-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fi-rr-eye-slash');
                icon.classList.add('fi-rr-eye');
            }
        });
    </script>
</body>

</html>

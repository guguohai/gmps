                                <textarea
                                    class="w-full bg-[#f5f7fa] border-none rounded-lg text-sm py-2 px-3 focus:ring-1 focus:ring-primary"
                                    rows="2" placeholder="请输入备注...">客户对服务非常满意，表示会继续使用我们的服务。</textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Toggle menu collapse/expand
        function toggleMenu(btn) {
            const content = btn.nextElementSibling;
            const allMenus = document.querySelectorAll('.menu-content');

            // Close all other menus
            allMenus.forEach(menu => {
                if (menu !== content) {
                    menu.classList.add('hidden');
                    // Reset arrow rotation
                    const closeBtn = menu.previousElementSibling;
                    const arrow = closeBtn.querySelector('.fi-rr-angle-small-down');
                    if (arrow) {
                        arrow.style.transform = 'rotate(0deg)';
                    }
                }
            });

            // Toggle current menu
            content.classList.toggle('hidden');

            // Rotate arrow
            const arrow = btn.querySelector('.fi-rr-angle-small-down');
            if (arrow) {
                if (content.classList.contains('hidden')) {
                    arrow.style.transform = 'rotate(0deg)';
                } else {
                    arrow.style.transform = 'rotate(180deg)';
                }
            }
        }

        // Toggle sidebar collapse/expand
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('w-64');
            sidebar.classList.toggle('w-20');
        }
    </script>
</body>

</html>

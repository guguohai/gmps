<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS -->

    <!-- Google Fonts -->

            font-family: 'uicons-solid';

            font-style: normal;

        [class^="fi-sr-"] {
            font-family: 'uicons-solid' !important;

            font-weight: normal;
            font-variant: normal;
            text-transform: none;
            line-height: 1;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

    <!-- Tailwind Config -->

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#177ee5",
                        "on-surface": "#26343d",
                        "on-surface-variant": "#52616a",
                        "background": "#F5F7FA",
                        "outline": "#cbd0dd",
                        "surface": "#ffffff",
                        "secondary": "#4a617a",
                        "error": "#9f403d"

                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]

                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F7FA;
        }

        h1,
        h2,
        h3,
        .font-headline {
            font-family: 'Manrope', sans-serif;
        }

        .heroicon {
            vertical-align: middle;
        }
    </style>
</head>

<body class="text-on-surface bg-background min-h-screen">
    <!-- Top Navigation Bar -->
    <header
        class="bg-white border-b border-outline fixed top-0 left-0 right-0 z-50 h-16 px-6 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <!-- Logo & Brand -->
            <div class="flex items-center gap-2">
                <img alt="PRODUCT SERVICE Logo" class="w-6 h-6 rounded-lg" src="logo.png" />
                <span class="text-lg font-bold text-[#6e7891] tracking-tight font-headline">PRODUCT SERVICE</span>
            </div>

            <!-- Search Bar -->
            <div class="relative hidden md:block">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" xmlns="http://www.w3.org/2000/svg"
                    width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M1.5 1a.5.5 0 0 0-.5.5v3a.5.5 0 0 1-1 0v-3A1.5 1.5 0 0 1 1.5 0h3a.5.5 0 0 1 0 1zM11 .5a.5.5 0 0 1 .5-.5h3A1.5 1.5 0 0 1 16 1.5v3a.5.5 0 0 1-1 0v-3a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 1-.5-.5M.5 11a.5.5 0 0 1 .5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 1 0 1h-3A1.5 1.5 0 0 1 0 14.5v-3a.5.5 0 0 1 .5-.5m15 0a.5.5 0 0 1 .5.5v3a1.5 1.5 0 0 1-1.5 1.5h-3a.5.5 0 0 1 0-1h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 1 .5-.5M3 4.5a.5.5 0 0 1 1 0v7a.5.5 0 0 1-1 0zm2 0a.5.5 0 0 1 1 0v7a.5.5 0 0 1-1 0zm2 0a.5.5 0 0 1 1 0v7a.5.5 0 0 1-1 0zm2 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zm3 0a.5.5 0 0 1 1 0v7a.5.5 0 0 1-1 0z">
                    </path>
                </svg>
                <input
                    class="pl-10 pr-4 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary transition-all"
                    style="background-color: #f5f7fa; width: 364px;" type="text" placeholder="Scan barcode" />
            </div>

            <!-- Inventory Warning Bar -->
            <div
                class="hidden lg:flex items-center gap-2 px-3 py-1.5 bg-[#FFFBEB] border border-[#FEF3C7] rounded-lg text-[#D97706] text-xs font-semibold shadow-sm">
                <i class="fi fi-sr-exclamation text-[14px] leading-none"></i>
                <span>当前库存不足</span>
            </div>

        </div>

        <!-- Right Actions -->
        <div class="flex items-center gap-4">
            <button
                class="p-2 hover:bg-slate-50 rounded-full text-slate-500 transition-colors flex items-center justify-center"
                title="Language">
                <i class="fi fi-rr-globe text-[20px] leading-none"></i>
            </button>
            <div class="flex items-center gap-3 pl-4 border-l border-slate-200 cursor-pointer">
                <div class="w-9 h-9 flex items-center justify-center bg-[#e3e7ed]" style="border-radius: 50px;">
                    <svg t="1774707118806" style="fill:#657489" viewBox="0 0 1024 1024" version="1.1"
                        xmlns="http://www.w3.org/2000/svg" p-id="1650" width="20" height="20">
                        <path
                            d="M502.178909 38.632727c-131.072 0-237.521455 104.168727-237.521454 232.727273s106.402909 232.727273 237.521454 232.727273c131.165091 0 237.568-104.168727 237.568-232.727273s-106.309818-232.727273-237.568-232.727273z m0 0c-131.072 0-237.521455 104.168727-237.521454 232.727273s106.402909 232.727273 237.521454 232.727273c131.165091 0 237.568-104.168727 237.568-232.727273s-106.309818-232.727273-237.568-232.727273zM413.184 581.678545c-169.472 0-306.874182 134.609455-306.874182 300.590546v19.316364c0 67.909818 137.402182 67.956364 306.874182 67.956363h197.957818c169.425455 0 306.781091-2.513455 306.781091-67.956363v-19.316364c0-165.981091-137.355636-300.590545-306.781091-300.590546H413.184z m0 0"
                            p-id="1651"></path>
                    </svg>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex pt-16 h-screen">
        <!-- Sidebar Navigation -->
        <aside id="sidebar"
            class="bg-white fixed left-0 top-16 bottom-0 w-64 flex flex-col h-[calc(100vh-64px)] overflow-y-auto no-scrollbar font-['Manrope'] text-sm font-medium z-40 border-r border-[#cbd0dd]">
            <nav class="py-4 flex-grow space-y-1">
                <!-- Dashboard -->
                <a class="flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 hover:text-primary transition-all"
                    href="./dashboard.html">
                    <i class="fi fi-rr-dashboard w-[16px] h-[16px] mr-3 flex items-center justify-center"></i>
                    <span class="text-[13px]">Dashboard</span>
                </a>

                <!-- 工单管理 Menu Group -->
                <div class="menu-group">
                    <button
                        class="menu-toggle w-full flex items-center justify-between px-6 py-3 text-slate-600 hover:bg-slate-50 hover:text-primary transition-all group"
                        onclick="toggleMenu(this)">
                        <div class="flex items-center">
                            <i class="fi fi-rr-ticket w-[16px] h-[16px] mr-3 flex items-center justify-center"></i>
                            <span class="text-[13px]">工单管理</span>
                        </div>
                        <i class="fi fi-rr-chevron-right w-[10px] h-[10px] text-slate-500"></i>
                    </button>
                    <div class="menu-content hidden py-1 bg-slate-50/50">
                        <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors"
                            href="./ticket_list.html">列表</a>
                    </div>
                </div>

                <!-- 产品管理 Menu Group -->
                <div class="menu-group">
                    <button
                        class="menu-toggle w-full flex items-center justify-between px-6 py-3 text-slate-600 hover:bg-slate-50 hover:text-primary transition-all group"
                        onclick="toggleMenu(this)">
                        <div class="flex items-center">
                            <i class="fi fi-rr-box w-[16px] h-[16px] mr-3 flex items-center justify-center"></i>
                            <span class="text-[13px]">产品管理</span>
                        </div>
                        <i class="fi fi-rr-chevron-right w-[10px] h-[10px] text-slate-500"></i>
                    </button>
                    <div class="menu-content hidden py-1">
                        <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors"
                            href="./product_list.html">列表</a>
                    </div>
                </div>

                <!-- 库存 Menu Group -->
                <div class="menu-group">
                    <button
                        class="menu-toggle w-full flex items-center justify-between px-6 py-3 text-slate-600 hover:bg-slate-50 hover:text-primary transition-all group"
                        onclick="toggleMenu(this)">
                        <div class="flex items-center">
                            <i class="fi fi-rr-boxes w-[16px] h-[16px] mr-3 flex items-center justify-center"></i>
                            <span class="text-[13px]">库存</span>
                        </div>
                        <i class="fi fi-rr-chevron-right w-[10px] h-[10px] text-slate-500"></i>
                    </button>
                    <div class="menu-content hidden py-1">
                        <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors"
                            href="./inventory_request_list.html">申请列表</a>
                    </div>
                </div>

                <!-- 小零件 Menu Group - Active -->
                <div class="menu-group">
                    <button
                        class="menu-toggle w-full flex items-center justify-between px-6 py-3 text-primary bg-blue-50/50 font-bold transition-all border-r-4 border-primary group"
                        onclick="toggleMenu(this)">
                        <div class="flex items-center">
                            <i
                                class="fi fi-rr-settings-sliders w-[16px] h-[16px] mr-3 flex items-center justify-center"></i>
                            <span class="text-[13px]">小零件</span>
                        </div>
                        <svg class="w-[12px] h-[12px] text-slate-500 transition-transform duration-200"
                            style="fill:none; stroke:currentColor; stroke-width:2;" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div class="menu-content py-1">
                        <a class="block pl-14 py-2 text-[13px] text-primary font-bold transition-colors relative after:content-[''] after:absolute after:left-[-12px] after:top-1/2 after:-translate-y-1/2 after:w-1 after:h-1 after:bg-primary after:rounded-full"
                            href="./parts_list.html">列表</a>
                        <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors"
                            href="./parts_request_list.html">申请列表</a>
                    </div>
                </div>

                <!-- 服务 Menu Group -->
                <div class="menu-group">
                    <button
                        class="menu-toggle w-full flex items-center justify-between px-6 py-3 text-slate-600 hover:bg-slate-50 hover:text-primary transition-all group"
                        onclick="toggleMenu(this)">
                        <div class="flex items-center">
                            <i
                                class="fi fi-rr-message-question w-[16px] h-[16px] mr-3 flex items-center justify-center"></i>
                            <span class="text-[13px]">服务</span>
                        </div>
                        <i class="fi fi-rr-chevron-right w-[10px] h-[10px] text-slate-500"></i>
                    </button>
                    <div class="menu-content hidden py-1">
                        <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors"
                            href="./service_survey.html">问卷</a>
                        <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors"
                            href="./service_consultation.html">咨询</a>
                    </div>
                </div>

                <!-- 用户权限 Menu Group -->
                <div class="menu-group">
                    <button
                        class="menu-toggle w-full flex items-center justify-between px-6 py-3 text-slate-600 hover:bg-slate-50 hover:text-primary transition-all group"
                        onclick="toggleMenu(this)">
                        <div class="flex items-center">
                            <i class="fi fi-rr-users-alt w-[16px] h-[16px] mr-3 flex items-center justify-center"></i>
                            <span class="text-[13px]">用户权限</span>
                        </div>
                        <svg class="w-[12px] h-[12px] text-slate-500 transition-transform duration-200"
                            style="fill:none; stroke:currentColor; stroke-width:2;" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div class="menu-content hidden py-1">
                        <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors"
                            href="./user_list.html">用户列表</a>
                        <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors"
                            href="./role_list.html">角色列表</a>
                        <a class="block pl-14 py-2 text-[13px] text-slate-500 hover:text-primary transition-colors"
                            href="./permission_list.html">权限列表</a>
                    </div>
                </div>
            </nav>

            <!-- Collapse Button -->
            <div class="border-t border-slate-100 p-4">
                <button class="w-full flex items-center px-2 text-slate-400 hover:text-primary transition-colors"
                    onclick="toggleSidebar()">
                    <i class="fi fi-rr-angle-left w-5 h-5 mr-3"></i>
                    <span class="text-xs font-semibold uppercase">Collapse</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="ml-64 flex-1 p-5 overflow-y-auto w-full">
            <!-- Breadcrumb -->
            <nav class="mb-5 text-sm font-medium flex items-center">
                <a href="./parts_list.html" class="text-primary hover:underline">小零件管理</a>
                <svg class="w-3 h-3 mx-2 text-slate-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                </svg>
                <a href="./parts_list.html" class="text-primary hover:underline">小零件列表</a>
                <svg class="w-3 h-3 mx-2 text-slate-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                </svg>
                <span class="text-slate-500">小零件详情</span>
            </nav>

            <div class="space-y-8 w-full">
                <!-- Page Header -->
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 w-full">
                    <div class="space-y-1">
                        <div class="flex items-center gap-3">
                            <h2 class="text-2xl font-extrabold text-on-surface font-headline tracking-tight">
                                100001</h2>
                            <span
                                class="px-2 py-0.5 bg-green-100 text-green-700 text-[10px] font-bold rounded uppercase">活跃</span>
                        </div>
                        <p class="text-xs text-on-surface-variant">创建于 2024 年 1 月 15 日 • 最后更新 2 小时前</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button
                            class="px-[18px] py-2 bg-primary text-white text-sm font-bold rounded-lg shadow-sm hover:opacity-90 transition-all inline-flex items-center gap-1.5">
                            <i class="fi fi-rr-disk w-4 h-4"></i>
                            <span>保存</span>
                        </button>
                    </div>
                </div>

                <!-- Parts Detail Form -->
                <div class="space-y-6">
                    <!-- 小零件基本信息 Section -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="px-8 py-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">
                                <!-- 小零件名称 -->
                                <div class="space-y-2">
                                    <label
                                        class="text-[12px] font-bold text-slate-400 uppercase tracking-wider">小零件名称</label>
                                    <input id="partNameInput"
                                        class="w-full h-[42px] px-4 bg-[#f5f7fa] border-none rounded-lg text-sm focus:ring-2 focus:ring-primary focus:bg-white transition-all font-body text-on-surface"
                                        type="text" value="钛合金鼻托 (Titanium Nose Pad)" placeholder="输入小零件名称" />
                                </div>
                                <!-- 数量 -->
                                <div class="space-y-2">
                                    <label
                                        class="text-[12px] font-bold text-slate-400 uppercase tracking-wider">总数量</label>
                                    <input id="partQuantityInput"
                                        class="w-full h-[42px] px-4 bg-[#f5f7fa] border-none rounded-lg text-sm focus:ring-2 focus:ring-primary focus:bg-white transition-all font-body text-on-surface"
                                        type="number" value="150" placeholder="0" />
                                </div>
                                <!-- 存放位置 -->
                                <div class="space-y-2">
                                    <label
                                        class="text-[12px] font-bold text-slate-400 uppercase tracking-wider">存放位置</label>
                                    <input id="partLocationInput"
                                        class="w-full h-[42px] px-4 bg-[#f5f7fa] border-none rounded-lg text-sm focus:ring-2 focus:ring-primary focus:bg-white transition-all font-body text-on-surface"
                                        type="text" value="A-102-05" placeholder="输入存放位置" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 数量配置 Section -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                        <div
                            class="px-8 py-5 border-b border-slate-50 flex items-center justify-between bg-slate-50/30">
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-slate-700 text-sm font-headline tracking-tight">数量配置</h3>
                            </div>
                            <button onclick="openStoreModal()"
                                class="h-8 px-4 bg-primary text-white text-[12px] font-bold rounded-lg shadow-sm hover:opacity-90 transition-all inline-flex items-center gap-1.5 uppercase tracking-wider">
                                <i class="fi fi-rr-plus text-[10px]"></i>
                                <span>添加</span>
                            </button>
                        </div>
                        <div class="overflow-x-auto min-w-0">
                            <table class="w-full text-left border-collapse" id="quantityConfigTable">
                                <thead
                                    class="bg-slate-50/50 text-[12px] font-bold text-slate-500 uppercase tracking-wider border-b border-slate-100">
                                    <tr>
                                        <th class="px-8 py-3 w-[20%]">门店类型</th>
                                        <th class="px-4 py-3">数量 1</th>
                                        <th class="px-4 py-3">数量 2</th>
                                        <th class="px-4 py-3">数量 3</th>
                                        <th class="px-4 py-3">数量 4</th>
                                        <th class="px-4 py-3">数量 5</th>
                                        <th class="px-4 py-3">数量 6</th>
                                        <th class="px-4 py-3 w-[80px]">操作</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-50 text-sm">
                                    <!-- Dynamic rows will be added here -->
                                    <tr class="hover:bg-slate-50/50 transition-colors">
                                        <td class="px-8 py-4 text-slate-700">旗舰店</td>
                                        <td class="px-4 py-2"><input type="number"
                                                class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary"
                                                value="1"></td>
                                        <td class="px-4 py-2"><input type="number"
                                                class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary"
                                                value="3"></td>
                                        <td class="px-4 py-2"><input type="number"
                                                class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary"
                                                value="5"></td>
                                        <td class="px-4 py-2"><input type="number"
                                                class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary"
                                                value="10"></td>
                                        <td class="px-4 py-2"><input type="number"
                                                class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary"
                                                value="30"></td>
                                        <td class="px-4 py-2"><input type="number"
                                                class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary"
                                                value="50"></td>
                                        <td class="px-4 py-2">
                                            <button onclick="removeRow(this)"
                                                class="text-slate-400 hover:text-red-500 transition-colors p-1"><i
                                                    class="fi fi-rr-trash"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <!-- Empty state if no rows -->
                            <div id="emptyState"
                                class="hidden py-12 flex flex-col items-center justify-center text-slate-400 space-y-3">
                                <i class="fi fi-rr-inbox text-4xl opacity-20"></i>
                                <span class="text-xs font-medium uppercase tracking-widest">暂无配置数据</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Store Selection Modal -->
    <div id="storeModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeStoreModal()"></div>
        <!-- Modal Content -->
        <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg transform transition-all">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <h3 class="text-base font-bold text-slate-800 font-headline">选择门店类型</h3>
                <button onclick="closeStoreModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i class="fi fi-rr-cross-small text-xl"></i>

    <script>
        // Toggle menu collapse/expand
        function toggleMenu(btn) {
            const content = btn.nextElementSibling;
            const allMenus = document.querySelectorAll('.menu-content');

            // Close all other menus
            allMenus.forEach(menu => {
                if (menu !== content) {
                    menu.classList.add('hidden');
                    // Reset arrow rotation if needed (depends on SVG used)
                    const closeBtn = menu.previousElementSibling;
                    const arrow = closeBtn.querySelector('svg');
                    if (arrow) arrow.style.transform = 'rotate(0deg)';
                }
            });

            // Toggle current menu
            content.classList.toggle('hidden');
            const arrow = btn.querySelector('svg');
            if (arrow) {
                arrow.style.transform = content.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
            }
        }

        // Toggle sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('w-64');
            sidebar.classList.toggle('w-20');
        }

        // Modal Functions
        function openStoreModal() {
            document.getElementById('storeModal').classList.remove('hidden');
        }

        function closeStoreModal() {
            document.getElementById('storeModal').classList.add('hidden');
        }

        // Table Row Functions
        function addStoreRow(storeName) {
            const tbody = document.querySelector('#quantityConfigTable tbody');
            const emptyState = document.getElementById('emptyState');

            const newRow = document.createElement('tr');
            newRow.className = "hover:bg-slate-50/50 transition-colors";
            newRow.innerHTML = `
                <td class="px-8 py-4 text-slate-700">${storeName}</td>
                <td class="px-4 py-2"><input type="number" class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary" placeholder="0"></td>
                <td class="px-4 py-2"><input type="number" class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary" placeholder="0"></td>
                <td class="px-4 py-2"><input type="number" class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary" placeholder="0"></td>
                <td class="px-4 py-2"><input type="number" class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary" placeholder="0"></td>
                <td class="px-4 py-2"><input type="number" class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary" placeholder="0"></td>
                <td class="px-4 py-2"><input type="number" class="w-full h-8 px-3 bg-[#f5f7fa] border-none rounded-md text-xs focus:ring-1 focus:ring-primary" placeholder="0"></td>
                <td class="px-4 py-2">
                    <button onclick="removeRow(this)" class="text-slate-400 hover:text-red-500 transition-colors p-1"><i class="fi fi-rr-trash"></i></button>
                </td>
            `;

            tbody.appendChild(newRow);
            checkEmptyState();
            closeStoreModal();
        }

        function removeRow(btn) {
            const row = btn.closest('tr');
            row.remove();
            checkEmptyState();
        }

        function checkEmptyState() {
            const tbody = document.querySelector('#quantityConfigTable tbody');
            const emptyState = document.getElementById('emptyState');
            const hasRows = tbody.querySelectorAll('tr').length > 0;

            if (hasRows) {
                emptyState.classList.add('hidden');
            } else {
                emptyState.classList.remove('hidden');
            }
        }
    </script>

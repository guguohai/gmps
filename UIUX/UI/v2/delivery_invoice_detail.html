    <script>
        function toggleMenu(btn) {
            const content = btn.nextElementSibling;
            const allMenus = document.querySelectorAll('.menu-content');
            allMenus.forEach(menu => { if (menu !== content) { menu.classList.add('hidden'); const arrow = menu.previousElementSibling.querySelector('.fi-rr-angle-small-down'); if (arrow) arrow.style.transform = 'rotate(0deg)'; } });
            content.classList.toggle('hidden');
            const arrow = btn.querySelector('.fi-rr-angle-small-down');
            if (arrow) arrow.style.transform = content.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }
    

    // Toggle dropdown (for language and user)
    function toggleDropdown(dropdownId) {
      const allDropdowns = document.querySelectorAll('[id$="-dropdown"]');
      allDropdowns.forEach((dropdown) => {
        if (dropdown.id !== dropdownId) {
          dropdown.classList.add("hidden");
        }
      });

      const dropdown = document.getElementById(dropdownId);
      if (dropdown) {
        dropdown.classList.toggle("hidden");
      }
    }

    // Close dropdown when clicking outside
    document.addEventListener("click", function (event) {
      const allDropdowns = document.querySelectorAll('[id$="-dropdown"]');

      allDropdowns.forEach((dropdown) => {
        const trigger = event.target.closest('[onclick*="' + dropdown.id + '"]');
        if (dropdown && !trigger && !dropdown.contains(event.target)) {
          dropdown.classList.add("hidden");
        }
      });
    });
  </script>

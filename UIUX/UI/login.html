<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | PRODUCT SERVICE</title>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      h1, h2, .kpi-font {
        font-family: 'Manrope', sans-serif;
      }
    </style>
</head>
<body class="bg-[#F5F7FA] text-on-surface min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Pattern (Subtle) -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none overflow-hidden">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40">
<path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="1"></path>
</pattern>
</defs>
<rect fill="url(#grid)" height="100%" width="100%"></rect>
</svg>
</div>
<!-- Main Content Canvas: Perfectly Centered Container -->
<main class="flex-grow flex items-center justify-center relative z-10 px-4 py-16">
<!-- Login Card -->
<div class="w-full bg-white rounded-xl shadow-lg overflow-hidden flex flex-col border border-outline/30" style="max-width: 500px;">
<!-- Header Section -->
<div class="pb-8 px-8 md:px-12 flex flex-col items-center text-center pt-10">
<div class="">
<img alt="Product Service Logo" class="h-[50px] w-[50px] object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujALaTdjrOs5YU1EYxSuxRZYwma9houA6QumXHeClw051gkeZjrelinmW3-iecVDy4Uj98jotWhzdz33r4nckNNmNzWJR7XYO9S8n6W5Cq1lAKN7w19rjAMLuz0rS2n1vk4qL2Ezkyq0Gp2d047izX2gMqwDQhgvypvlNrqaKKX9jhxBx2o0XGmCxwUjE3i4Xtn61w7W7vfIQp7LSSg4njxJOPvQKOCKzFeqaXcvNYqvbRDxauUsN3jW9uRAJGG5Z6SVESS1xl0"/>
</div>
<h1 class="font-extrabold tracking-tighter uppercase text-[#6e7891] text-2xl md:text-3xl leading-none">
                    PRODUCT SERVICE
                </h1>
<p class="text-on-surface-variant font-semibold text-2xl mt-1 uppercase tracking-wider">LOGIN</p>
</div>
<!-- Form Section -->
<form class="px-8 md:px-12 pb-12 space-y-6" onsubmit="return false;">
<!-- Username Input -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant px-1" for="username">
                        ID
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">
                            person
                        </span>
<input class="w-full bg-surface-container border border-outline rounded-xl py-3.5 pl-11 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400" id="username" placeholder="Enter your ID" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant" for="password">
                            Password
                        </label>
<a class="text-[11px] font-semibold text-primary hover:underline transition-all" href="#">
                            Forgot password?
                        </a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">
                            lock
                        </span>
<input class="w-full bg-surface-container border border-outline rounded-xl py-3.5 pl-11 pr-11 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-bold py-4 px-4 rounded-xl shadow-md hover:shadow-lg hover:bg-primary-dim transition-all duration-200 transform active:scale-[0.98] mt-4 flex items-center justify-center space-x-2" type="submit">
<span class="text-sm">Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
</div>
</main>
<!-- Footer: Fixed at bottom -->
<footer class="flex flex-col md:flex-row justify-center items-center space-y-4 md:space-y-0 md:space-x-8 w-full py-8 font-['Inter'] text-[10px] md:text-xs text-slate-500 bg-transparent relative z-10 px-6 text-center">
<span>© 2024 Arctic Precision After-Sales. All rights reserved.</span>
<div class="flex space-x-4">
<a class="hover:text-slate-700 transition-colors" href="#">Terms of Service</a>
<a class="hover:text-slate-700 transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-slate-700 transition-colors" href="#">System Status</a>
</div>
</footer>
</body></html>

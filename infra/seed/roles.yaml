roles:
  - role_code: CS_MANAGER
    role_name: 客服主管
    role_type: BUSINESS_ROLE
    role_desc: 负责申请审核、工单关闭等操作
    status: ENABLED
  - role_code: RECEIVE_OPERATOR
    role_name: 接收专员
    role_type: BUSINESS_ROLE
    role_desc: 负责确认接收产品
    status: ENABLED
  - role_code: JUDGE_OPERATOR
    role_name: 判定专员
    role_type: BUSINESS_ROLE
    role_desc: 负责提交判定、客户确认、生成支付单
    status: ENABLED
  - role_code: SERVICE_ENGINEER
    role_name: 服务工程师
    role_type: BUSINESS_ROLE
    role_desc: 负责开始处理、等待配件、提交处理完成
    status: ENABLED
  - role_code: FULFILLMENT_OPERATOR
    role_name: 履约专员
    role_type: BUSINESS_ROLE
    role_desc: 负责出库准备、提交出库
    status: ENABLED
  - role_code: STORE_OPERATOR
    role_name: 门店操作员
    role_type: BUSINESS_ROLE
    role_desc: 负责门店收货、门店可取、客户取件确认
    status: ENABLED
  - role_code: SYSTEM_ADMIN
    role_name: 系统管理员
    role_type: SYSTEM_ROLE
    role_desc: 负责用户、角色、权限、配置维护
    status: ENABLED


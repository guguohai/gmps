version: "3.9"

services:
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: ps_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ps_admin}
      MYSQL_USER: ${MYSQL_USER:-ps_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3307}:${MYSQL_CONTAINER_PORT:-3306}"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:${REDIS_VERSION:-7}
    container_name: ps_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_CONTAINER_PORT:-6379}"
    volumes:
      - redis_data:/data

  core_api:
    build:
      context: ../..
      dockerfile: infra/docker/core_api.Dockerfile
    container_name: ps_core_api
    restart: unless-stopped
    ports:
      - "${CORE_API_PORT:-8000}:8000"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@${MYSQL_HOST:-mysql}:${MYSQL_CONTAINER_PORT:-3306}/${MYSQL_DATABASE:-ps_admin}
    depends_on:
      - mysql

  notification_service:
    build:
      context: ../..
      dockerfile: infra/docker/notification_service.Dockerfile
    container_name: ps_notification_service
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8001}:8001"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@${MYSQL_HOST:-mysql}:${MYSQL_CONTAINER_PORT:-3306}/${MYSQL_DATABASE:-ps_admin}
      CELERY_BROKER_URL: redis://${REDIS_HOST:-redis}:${REDIS_CONTAINER_PORT:-6379}/0
      CELERY_RESULT_BACKEND: redis://${REDIS_HOST:-redis}:${REDIS_CONTAINER_PORT:-6379}/0
    depends_on:
      - mysql
      - redis

  notification_worker:
    build:
      context: ../..
      dockerfile: infra/docker/notification_service.Dockerfile
    container_name: ps_notification_worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@${MYSQL_HOST:-mysql}:${MYSQL_CONTAINER_PORT:-3306}/${MYSQL_DATABASE:-ps_admin}
      CELERY_BROKER_URL: redis://${REDIS_HOST:-redis}:${REDIS_CONTAINER_PORT:-6379}/0
      CELERY_RESULT_BACKEND: redis://${REDIS_HOST:-redis}:${REDIS_CONTAINER_PORT:-6379}/0
    depends_on:
      - mysql
      - redis

  admin_web:
    build:
      context: ../..
      dockerfile: infra/docker/admin_web.Dockerfile
    container_name: ps_admin_web
    restart: unless-stopped
    ports:
      - "${ADMIN_WEB_PORT:-4173}:4173"
    depends_on:
      - core_api

volumes:
  mysql_data:
  redis_data:
